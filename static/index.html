<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANPHIX</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080a0e;
    --bg2:       #0d1117;
    --bg3:       #111620;
    --border:    #1e2a3a;
    --accent:    #00d4ff;
    --accent2:   #0088aa;
    --accent3:   #00ff9d;
    --text:      #c8d8e8;
    --text-dim:  #4a6070;
    --user-bg:   #0a1628;
    --bot-bg:    #080f1a;
    --danger:    #ff3355;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Rajdhani', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scan line */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanline 4s linear infinite;
    z-index: 999;
    opacity: 0.4;
  }

  @keyframes scanline {
    0%   { top: 0; }
    100% { top: 100vh; }
  }

  /* ── LOGIN ── */
  #login-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: var(--bg);
  }

  .login-box {
    border: 1px solid var(--accent2);
    background: var(--bg2);
    padding: 48px 56px;
    width: 420px;
    position: relative;
    animation: fadeIn 0.6s ease;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; right: 20px;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  .login-logo {
    font-family: var(--mono);
    font-size: 2.4rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
    margin-bottom: 8px;
    text-align: center;
  }

  .login-tagline {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .login-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .login-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 1rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.1em;
  }

  .login-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(0,212,255,0.2);
  }

  .login-btn {
    width: 100%;
    margin-top: 20px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    padding: 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .login-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: -1;
  }

  .login-btn:hover { color: var(--bg); }
  .login-btn:hover::before { transform: translateX(0); }

  .login-error {
    color: var(--danger);
    font-family: var(--mono);
    font-size: 0.75rem;
    margin-top: 12px;
    text-align: center;
    letter-spacing: 0.1em;
    display: none;
  }

  /* ── APP ── */
  #app {
    display: none;
    flex-direction: column;
    height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
  }

  .header-logo {
    font-family: var(--mono);
    font-size: 1.2rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(0,212,255,0.4);
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 6px var(--accent3);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-actions {
    display: flex;
    gap: 12px;
  }

  .btn-icon {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 6px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .btn-icon:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    gap: 14px;
    animation: msgIn 0.3s ease;
    max-width: 860px;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.bot  { align-self: flex-start; }

  .msg-avatar {
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 0.65rem;
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }

  .message.user .msg-avatar {
    border-color: var(--accent2);
    color: var(--accent);
  }

  .message.bot .msg-avatar {
    border-color: var(--accent3);
    color: var(--accent3);
    text-shadow: 0 0 6px var(--accent3);
  }

  .msg-content {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 14px 18px;
    font-size: 0.95rem;
    line-height: 1.7;
    position: relative;
    max-width: 720px;
  }

  .message.user .msg-content {
    border-color: var(--accent2);
    background: var(--user-bg);
    color: var(--text);
  }

  .message.bot .msg-content {
    border-left: 2px solid var(--accent3);
  }

  .msg-content strong { color: var(--accent); }
  .msg-content em { color: var(--text-dim); }

  .msg-content pre {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 12px;
    margin: 10px 0;
    font-family: var(--mono);
    font-size: 0.8rem;
    overflow-x: auto;
    color: var(--accent3);
  }

  .msg-content ul, .msg-content ol {
    padding-left: 20px;
    margin: 8px 0;
  }

  .msg-content li { margin: 4px 0; }

  /* Thinking indicator */
  .thinking {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 4px 0;
  }

  .thinking span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s ease infinite;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40%           { transform: scale(1); opacity: 1; }
  }

  /* Web search indicator */
  .searching {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    animation: blink 1s ease infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  /* Input area */
  .input-area {
    border-top: 1px solid var(--border);
    background: var(--bg2);
    padding: 16px 28px 20px;
    flex-shrink: 0;
    position: relative;
  }

  .input-area::before {
    content: '';
    position: absolute;
    top: -1px; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
  }

  .input-wrapper {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    border: 1px solid var(--border);
    background: var(--bg3);
    padding: 12px 16px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent2);
    box-shadow: 0 0 12px rgba(0,212,255,0.08);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.95rem;
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.5;
  }

  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 8px 16px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    flex-shrink: 0;
    align-self: flex-end;
  }

  #send-btn:hover:not(:disabled) {
    background: var(--accent2);
    color: var(--bg);
  }

  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .input-hint {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-top: 8px;
    text-align: right;
  }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 60px 20px;
    animation: fadeIn 0.8s ease;
  }

  .welcome-logo {
    font-family: var(--mono);
    font-size: 3rem;
    letter-spacing: 0.4em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,212,255,0.4), 0 0 60px rgba(0,212,255,0.2);
    margin-bottom: 12px;
  }

  .welcome-sub {
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .welcome-topics {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 600px;
    margin: 0 auto;
  }

  .topic-tag {
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    padding: 5px 12px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--mono);
  }

  .topic-tag:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 8px rgba(0,212,255,0.15);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Attachment preview */
  #attachment-preview {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 0 4px;
  }

  .attach-thumb {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border: 1px solid var(--accent2);
  }

  .attach-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.08em;
  }

  .attach-remove {
    background: transparent;
    border: none;
    color: var(--danger);
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1;
    padding: 0;
  }

  #attach-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 1rem;
    width: 34px;
    height: 34px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    align-self: flex-end;
    transition: all 0.2s;
  }

  #attach-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .msg-img {
    max-width: 200px;
    max-height: 160px;
    object-fit: contain;
    border: 1px solid var(--accent2);
    display: block;
    margin-bottom: 8px;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .login-box { width: 90%; padding: 32px 24px; }
    #messages  { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">MANPHIX</div>
    <div class="login-tagline">Intelligent Information System</div>
    <label class="login-label">Access Code</label>
    <input type="password" class="login-input" id="password-input" placeholder="••••••••" autocomplete="off">
    <button class="login-btn" onclick="doLogin()">Initialize Session</button>
    <div class="login-error" id="login-error">⚠ Access denied. Invalid credentials.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-logo">MANPHIX</div>
    <div class="header-status">
      <div class="status-dot"></div>
      <span>System Online</span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="clearChat()">Clear</button>
      <button class="btn-icon" onclick="logout()">Logout</button>
    </div>
  </header>

  <div id="messages">
    <div class="welcome">
      <div class="welcome-logo">MANPHIX</div>
      <div class="welcome-sub">Real-time intelligence · Web-augmented · Always on</div>
      <div class="welcome-topics">
        <span class="topic-tag" onclick="quickAsk('Ultime notizie Serie A')">Serie A</span>
        <span class="topic-tag" onclick="quickAsk('Ultimi modelli AI usciti')">AI & LLM</span>
        <span class="topic-tag" onclick="quickAsk('Situazione geopolitica attuale')">Geopolitica</span>
        <span class="topic-tag" onclick="quickAsk('Nuova musica italiana 2025')">Musica IT</span>
        <span class="topic-tag" onclick="quickAsk('Champions League aggiornamenti')">Champions</span>
        <span class="topic-tag" onclick="quickAsk('Politica americana oggi')">Politica USA</span>
        <span class="topic-tag" onclick="quickAsk('Cronaca nera USA recente')">Cronaca USA</span>
        <span class="topic-tag" onclick="quickAsk('Trend podcast italiani')">Podcast</span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div id="attachment-preview"></div>
    <div class="input-wrapper">
      <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Allega file">📎</button>
      <input type="file" id="file-input" style="display:none"
             accept="image/*,.pdf,.txt,.md,.csv,.log,.json,.py,.js"
             onchange="onFileSelected(event)">
      <textarea id="user-input" rows="1" placeholder="Chiedi qualcosa a Manphix..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">Send ›</button>
    </div>
    <div class="input-hint">Enter to send · Shift+Enter for new line · 📎 allega file</div>
  </div>
</div>

<script>
  let sessionId = null;

  // ── LOGIN ──
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const pwd = document.getElementById('password-input').value;
    const err = document.getElementById('login-error');
    err.style.display = 'none';

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      });

      if (!res.ok) {
        err.style.display = 'block';
        return;
      }

      const data = await res.json();
      sessionId = data.session_id;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('user-input').focus();
    } catch {
      err.style.display = 'block';
    }
  }

  function logout() {
    sessionId = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('password-input').value = '';
  }

  // ── CHAT ──
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function quickAsk(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  function addMessage(role, content, imageDataUrl) {
    // Remove welcome if present
    const welcome = document.querySelector('.welcome');
    if (welcome) welcome.remove();

    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = role === 'user' ? 'YOU' : 'MX';
    const imgHtml = imageDataUrl
      ? `<img class="msg-img" src="${imageDataUrl}" alt="attachment">`
      : '';
    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div class="msg-content">${imgHtml}${content ? formatMessage(content) : ''}</div>
    `;

    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function addThinking() {
    const welcome = document.querySelector('.welcome');
    if (welcome) welcome.remove();

    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'thinking-indicator';
    div.innerHTML = `
      <div class="msg-avatar">MX</div>
      <div class="msg-content">
        <div class="searching">🔍 Searching web...</div>
        <div class="thinking"><span></span><span></span><span></span></div>
      </div>
    `;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById('thinking-indicator');
    if (el) el.remove();
  }

  function formatMessage(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code style="font-family:var(--mono);color:var(--accent3);background:var(--bg);padding:2px 6px;">$1</code>')
      .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
      .replace(/\n/g, '<br>');
  }

  let pendingFile = null;
  let pendingFileDataUrl = null;

  function onFileSelected(event) {
    const file = event.target.files[0];
    if (!file) return;

    if (file.size > 10 * 1024 * 1024) {
      alert('File troppo grande. Limite: 10MB');
      event.target.value = '';
      return;
    }

    pendingFile = file;
    const preview = document.getElementById('attachment-preview');
    preview.innerHTML = '';
    preview.style.display = 'flex';

    if (file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = (e) => {
        pendingFileDataUrl = e.target.result;
        const img = document.createElement('img');
        img.className = 'attach-thumb';
        img.src = pendingFileDataUrl;
        const btn = document.createElement('button');
        btn.className = 'attach-remove';
        btn.textContent = '✕';
        btn.onclick = removeAttachment;
        preview.appendChild(img);
        preview.appendChild(btn);
      };
      reader.readAsDataURL(file);
    } else {
      pendingFileDataUrl = null;
      const chip = document.createElement('div');
      chip.className = 'attach-chip';
      chip.textContent = file.name;
      const btn = document.createElement('button');
      btn.className = 'attach-remove';
      btn.textContent = '✕';
      btn.onclick = removeAttachment;
      preview.appendChild(chip);
      preview.appendChild(btn);
    }
  }

  function removeAttachment() {
    pendingFile = null;
    pendingFileDataUrl = null;
    const preview = document.getElementById('attachment-preview');
    preview.style.display = 'none';
    preview.innerHTML = '';
    document.getElementById('file-input').value = '';
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const text = input.value.trim();
    if ((!text && !pendingFile) || !sessionId) return;

    const messageText = text || '(vedi allegato)';
    const capturedDataUrl = pendingFileDataUrl;

    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;

    addMessage('user', messageText, capturedDataUrl);
    addThinking();

    const fd = new FormData();
    fd.append('session_id', sessionId);
    fd.append('message', messageText);
    if (pendingFile) fd.append('file', pendingFile);

    removeAttachment();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        body: fd
      });

      removeThinking();

      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();
      addMessage('bot', data.response);
    } catch {
      removeThinking();
      addMessage('bot', '⚠ Errore di connessione. Riprova.');
    }

    btn.disabled = false;
    input.focus();
  }

  async function clearChat() {
    if (!sessionId) return;
    await fetch(`/session/${sessionId}`, { method: 'DELETE' });
    const msgs = document.getElementById('messages');
    msgs.innerHTML = `
      <div class="welcome">

    `;
